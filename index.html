                `;
                document.getElementById('result-modal').style.display = 'flex';
            },
            toolOut() {
                if(!MatchState.active || MatchState.dock.length===0) return; let list = MatchState.dock.filter(t=>!t.isRemoving).slice(0,3); if(list.length===0) return;
                MatchState.history.push({ type:'out', tiles:list }); let bIdx = MatchState.extraDock.length;
                list.forEach((t, i) => {
                    t.inDock=false; t.isLanded=false; t.isEx=true; MatchState.extraDock.push(t); t.el.classList.remove('in-dock'); t.el.classList.add('in-extra');
                    t.el.style.left = (10+(bIdx+i)%3*55)+'px'; t.el.style.top = (25-Math.floor((bIdx+i)/3)*20)+'px'; t.el.style.zIndex = 100+bIdx+i; this.dockEl.removeChild(t.el); this.exDockEl.appendChild(t.el);
                });
                MatchState.dock = MatchState.dock.filter(t=>!list.includes(t)); MatchState.dock.forEach((item, idx) => item.el.style.order=idx); this.checkCover();
            },
            toolUndo() {
                if(!MatchState.active || MatchState.history.length===0) return; if(State.coins < 20) { UI.toast("金币不足!"); return; }
                State.coins -= 20; Storage.save(); let act = MatchState.history.pop();
                if(act.type==='pick') {
                    let t = act.tile; MatchState.dock = MatchState.dock.filter(x=>x.id!==t.id); t.inDock=false; t.isLanded=false; t.el.classList.remove('in-dock'); t.el.style.transform='';
                    if(act.prev==='ex') {
                        t.isEx=true; MatchState.extraDock.push(t); t.el.classList.add('in-extra'); let i=MatchState.extraDock.length-1;
                        t.el.style.left = (10+i%3*55)+'px'; t.el.style.top = (25-Math.floor(i/3)*20)+'px'; t.el.style.zIndex=100+i; this.dockEl.removeChild(t.el); this.exDockEl.appendChild(t.el);
                    } else {
                        t.isEx=false; t.el.style.position='absolute'; t.el.style.left=t.oX+'px'; t.el.style.top=t.oY+'px'; t.el.style.zIndex=t.oZ; this.dockEl.removeChild(t.el); this.mapEl.appendChild(t.el);
                    }
                    MatchState.dock.forEach((item, idx)=>item.el.style.order=idx); this.checkCover();
                } else if(act.type==='out') {
                    act.tiles.forEach(t=>{
                        MatchState.extraDock = MatchState.extraDock.filter(x=>x.id!==t.id); t.isEx=false; t.inDock=true; t.isLanded=true; MatchState.dock.push(t);
                        t.el.classList.remove('in-extra'); t.el.classList.add('in-dock'); t.el.style.cssText=''; this.exDockEl.removeChild(t.el); this.dockEl.appendChild(t.el);
                    });
                    MatchState.dock.sort((a,b)=>(a.type===b.type)?a.time-b.time:MatchState.dock.find(x=>x.type===a.type).time-MatchState.dock.find(x=>x.type===b.type).time);
                    MatchState.dock.forEach((item, idx)=>item.el.style.order=idx); this.checkCover(); this.checkMatch();
                }
            },
            toolShuffle() {
                let mapT = MatchState.tiles.filter(t=>!t.inDock&&!t.isEx&&!t.isRm); if(mapT.length===0) return;
                if(State.coins < 50) { UI.toast("金币不足!"); return; } State.coins -= 50; Storage.save();
                const cX = this.mapEl.clientWidth/2 - 26, cY = this.mapEl.clientHeight/2 - 34;
                mapT.forEach(t => { t.el.style.transition="all 0.4s ease-in"; t.el.style.left=cX+'px'; t.el.style.top=cY+'px'; t.el.style.zIndex=2000; t.el.style.transform="rotate(360deg) scale(0.5)"; });
                setTimeout(() => {
                    let pos = mapT.map(t=>({x:t.oX, y:t.oY, z:t.oZ, l:t.l})).sort(()=>Math.random()-0.5);
                    mapT.forEach((t, i) => { t.oX=pos[i].x; t.oY=pos[i].y; t.oZ=pos[i].z; t.l=pos[i].l; t.x=pos[i].x; t.y=pos[i].y; t.el.style.zIndex=t.oZ; });
                    this.checkCover(); mapT.forEach(t=>t.el.style.transition="none");
                    setTimeout(() => mapT.forEach(t => { t.el.style.transition="all 0.5s ease"; t.el.style.left=t.oX+'px'; t.el.style.top=t.oY+'px'; t.el.style.transform="rotate(0deg) scale(1)"; }), 20);
                }, 400);
            }
        };

        // ==================== 6. 动物园系统 ====================
        let currentZooAnimals =[], visitors =[];
        const ZooSystem = {
            screen: document.getElementById('zoo-screen'), area: document.getElementById('habitat-animal-area'), scroller: document.getElementById('zoo-scroller'),
            open(instant = false) {
                this.screen.style.display = 'flex'; 
                if(!MatchState.isPrankMode) this.renderHabitat(); 
                this.initVisitors(); 
                document.querySelector('.bottom-dock').style.display = MatchState.isPrankMode ? 'none' : 'flex';

                let targetScroll = MatchState.isPrankMode ? this.scroller.offsetWidth * 2 : this.scroller.offsetWidth;
                if(instant) { 
                    this.scroller.style.scrollBehavior='auto'; 
                    this.scroller.scrollLeft = targetScroll; 
                    requestAnimationFrame(()=>setTimeout(()=>this.scroller.style.scrollBehavior='smooth', 50)); 
                } else { setTimeout(()=>this.scroller.scrollLeft = targetScroll, 10); }
            },
            close() { this.screen.style.display = 'none'; visitors.forEach(v=>{clearTimeout(v.timer); if(v.el.parentNode) v.el.parentNode.removeChild(v.el);}); visitors=[]; document.querySelector('.bottom-dock').style.display='none'; },
            
            renderHabitat() {
                this.area.innerHTML = ''; currentZooAnimals =[]; 
                
                let uniques =[...new Set(State.animals.map(a=>a.type || 'cat'))];
                if(uniques.length === 0) {
                    this.area.innerHTML = '<div style="width:100%;height:100%;display:flex;justify-content:center;align-items:center;color:#5d4037;font-size:20px;">空荡荡的...去拆快递吧！</div>';
                    this.updateUI(); return;
                }

                uniques.forEach(type => {
                    let anis = State.animals.filter(a=>(a.type || 'cat') === type);
                    let baseInfo = Config.ANIMALS.find(a => a.type === type && a.rarity === 'normal') || anis[0];
                    
                    let z = document.createElement('div'); 
                    z.className = 'habitat-zone'; 
                    z.dataset.type = type; 
                    z.dataset.name = baseInfo.baseName || "动物园"; 
                    z.dataset.count = anis.length; 
                    z.dataset.img = baseInfo.url;
                    
                    z.innerHTML = '<div class="habitat-fence"></div>'; 
                    this.area.appendChild(z);
                    
                    anis.forEach(a => this.spawnAnimal(a, z));
                });
                
                EventSystem.renderTrash(); this.updateUI();
            },
            spawnAnimal(data, zone, sX=null, sY=null) {
                if(!data.level) data.level=1; if(!data.uuid) data.uuid=Date.now()+Math.random();
                let wrap = document.createElement('div'); wrap.className='animal-wrapper'; wrap.dataset.uuid=data.uuid; wrap.dataset.level=data.level;

                let x = sX !== null ? sX : 24 + Math.random() * (zone.clientWidth - 108);
                let y = sY !== null ? sY : 40 + Math.random() * (zone.clientHeight - 144);
                if (!MatchState.isPrankMode && State.trashCount > 0 && sX===null) { wrap.dataset.panic='true'; x = Math.random()<0.5?30:zone.clientWidth-90; }
                wrap.style.cssText = `left:${x}px; top:${y}px; z-index:${Math.floor(y)}`;

                let dir = document.createElement('div'); dir.className='animal-dir'; if(Math.random()>0.5) dir.classList.add('face-left');
                let evo = Config.EVO[data.level]||Config.EVO[1]; 
                
                dir.innerHTML = `<div class="animal-scale ${evo.class}"><img src="${data.url}" class="zoo-animal idle" style="animation-delay:${Math.random()*2}s; ${wrap.dataset.panic==='true'?'animation-duration:0.1s':''}"></div>`;
                wrap.appendChild(dir); zone.appendChild(wrap);

                let img = wrap.querySelector('img');
                let obj = { wrapper:wrap, dirLayer:dir, img:img, x:x, y:y, container:zone }; 
                
                let timer = null, long = false;
                let meagerDestroyer = null;
                
                const down = () => { 
                    if(MatchState.isPrankMode) return; 
                    long = false; 
                    
                    let comp = window.getComputedStyle(wrap);
                    let curX = comp.left;
                    let curY = comp.top;
                    
                    wrap.style.transition = 'none';
                    wrap.style.left = curX;
                    wrap.style.top = curY;
                    obj.x = parseFloat(curX);
                    obj.y = parseFloat(curY);

                    img.className = 'zoo-animal idle'; 

                    let cands = State.animals.filter(a => a.id === data.id && (a.level || 1) === (data.level || 1));
                    if (cands.length >= 2) {
                        let rect = wrap.getBoundingClientRect();
                        let cX = rect.left + rect.width / 2;
                        let cY = rect.top + rect.height / 2;
                        meagerDestroyer = SpineManager.playMeager(cX, cY);
                        wrap.classList.add('charging'); 
                    }

                    timer = setTimeout(() => { 
                        long = true; 
                        this.merge(data, wrap, zone, cands.length >= 2); 
                    }, 400); 
                };
                
                const up = () => { 
                    if(timer) clearTimeout(timer); 
                    if(!long){ 
                        if(meagerDestroyer) meagerDestroyer();
                        meagerDestroyer = null;

                        wrap.classList.remove('charging'); 
                        setTimeout(() => img.className='zoo-animal idle', 500); 
                    } 
                };
                
                wrap.addEventListener('mousedown', down); 
                wrap.addEventListener('touchstart', down, {passive:true}); 
                wrap.addEventListener('mouseup', up); 
                wrap.addEventListener('mouseleave', up); 
                wrap.addEventListener('touchend', up);

                currentZooAnimals.push(obj); 
                this.animalAI(obj);
            },
            animalAI(ani) {
                if(!ani.wrapper.parentNode) return;
                if(ani.wrapper.classList.contains('charging') || ani.wrapper.style.opacity==='0' || ani.wrapper.dataset.panic==='true') { setTimeout(()=>this.animalAI(ani), 1000); return; }
                if(Math.random() < 0.4) {
                    ani.img.className='zoo-animal walking';
                    let tX = 24 + Math.random()*(ani.container.clientWidth - 108), tY = 40 + Math.random()*(ani.container.clientHeight - 144);
                    let dur = Math.max(2000, Math.hypot(tX-ani.x, tY-ani.y)/15*1000);
                    ani.dirLayer.classList.toggle('face-left', tX < ani.x);
                    ani.wrapper.style.transition = `left ${dur}ms linear, top ${dur}ms linear`;
                    ani.wrapper.style.left = tX+'px'; ani.wrapper.style.top = tY+'px'; ani.wrapper.style.zIndex = Math.floor(tY);
                    ani.x=tX; ani.y=tY; setTimeout(()=>this.animalAI(ani), dur);
                } else {
                    ani.img.className='zoo-animal idle'; setTimeout(()=>this.animalAI(ani), 2000+Math.random()*3000);
                }
            },
            
           merge(data, tWrap, zone, canMerge) {
                if(!canMerge) { 
                    tWrap.classList.remove('charging'); 
                    tWrap.style.animation = 'none'; tWrap.offsetHeight; tWrap.style.animation = 'errorShake 0.3s';
                    let tip = document.createElement('div'); tip.className = 'merge-text'; tip.innerText = "缺少同类!"; 
                    tip.style.left = tWrap.style.left; tip.style.top = tWrap.style.top; zone.appendChild(tip); setTimeout(() => tip.remove(), 1000);
                    return; 
                }
                
                let tX = parseFloat(tWrap.style.left), tY = parseFloat(tWrap.style.top);
                let partners = State.animals.filter(a=>a.id===data.id && (a.level||1)===(data.level||1)).filter(a=>a.uuid!==data.uuid);
                partners.forEach(p => {
                    let w = zone.querySelector(`.animal-wrapper[data-uuid='${p.uuid}']`);
                    if(w) { w.style.transition=`all 0.5s cubic-bezier(0.55, 0.085, 0.68, 0.53)`; w.style.left=tX+'px'; w.style.top=tY+'px'; w.style.transform='scale(0.1) rotate(90deg)'; w.style.opacity=0; }
                });

                setTimeout(() => {
                    let cands = State.animals.filter(a=>a.id===data.id && (a.level||1)===(data.level||1));
                    State.animals = State.animals.filter(a=>!cands.map(x=>x.uuid).includes(a.uuid));
                    
                    let lv = (data.level||1) + (cands.length>=8?3:cands.length>=4?2:1);
                    let newAni;

                    let isBaseForm = Config.ANIMALS.find(a => a.id === data.id)?.rarity === 'normal';

                    if (isBaseForm) {
                        let specialCandidates = Config.ANIMALS.filter(a => a.type === data.type && a.rarity === 'rare');
                        if (specialCandidates.length > 0) {
                            let specialData = specialCandidates[Math.floor(Math.random() * specialCandidates.length)];
                            newAni = {...specialData, level: 1, uuid: Date.now()+Math.random()};
                            lv = 1; 
                        } else {
                            newAni = {...data, level: lv, uuid: Date.now()+Math.random()};
                        }
                    } else {
                        newAni = {...data, level: lv, uuid: Date.now()+Math.random()};
                    }

                    State.animals.push(newAni); Storage.save(); 

                    let poofSize = 100 + (cands.length * 15); let poof = document.createElement('div'); poof.className = 'merge-poof'; 
                    poof.style.width = poofSize + 'px'; poof.style.height = poofSize + 'px'; poof.style.left = tX + 'px'; poof.style.top = tY + 'px'; 
                    zone.appendChild(poof); setTimeout(() => poof.remove(), 500);

                    tWrap.remove(); partners.forEach(p=>{let w=zone.querySelector(`.animal-wrapper[data-uuid='${p.uuid}']`); if(w) w.remove();});
                    
                    let over = document.createElement('div');
                    over.className = 'reward-dim-layer';
                    over.style.display = 'flex';
                    over.style.flexDirection = 'column';
                    over.style.justifyContent = 'center';
                    over.style.alignItems = 'center';
                    document.body.appendChild(over);

                    this.showNewAnimal(newAni, lv, tX, tY, zone, cands.length, over);
                    
                }, 520); 
            },
            
            showNewAnimal(data, lv, x, y, zone, count, over) {
                let pre = Config.EVO[lv] ? Config.EVO[lv].namePrefix : "";
                let isMutation = (data.rarity === 'rare' && lv === 1);
                if (isMutation) pre = "变异·";

                let light = document.createElement('div');
                light.className = 'evo-light';
                light.style.cssText = 'position:absolute; width:500px; height:500px; background:radial-gradient(circle,rgba(255,255,255,0.4) 0%,transparent 70%); animation:spinLight 10s linear infinite; pointer-events:none; z-index:1;';
                
                let imgBox = document.createElement('div');
                imgBox.style.cssText = 'position:relative; z-index:2; width:150px; height:150px; display:flex; justify-content:center; align-items:center; transform:scale(0); animation: popUp 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49) forwards;';
                let img = document.createElement('img');
                img.src = data.url;
                img.className = Config.EVO[lv] ? Config.EVO[lv].class : '';
                img.style.cssText = 'width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 10px 10px rgba(0,0,0,0.5));';
                imgBox.appendChild(img);
                
                let title = document.createElement('div');
                title.innerHTML = `<div style="font-size:24px; color:#f39c12; margin-bottom:10px; font-weight:bold; text-shadow:1px 1px 2px #000;">${isMutation ? '✨ 变异成功 ✨' : '✨ 进化成功 ✨'}</div>
                                   <div style="font-size:32px; color:#fff; font-weight:bold; text-shadow:2px 2px 4px #000;">${pre + data.name}</div>
                                   <div style="font-size:20px; color:#e0e0e0; margin-top:5px; font-weight:bold;">Level ${lv}</div>`;
                title.style.cssText = 'text-align:center; z-index:2; transform:scale(0); animation: popUp 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49) forwards; animation-delay: 0.2s; opacity:0;';

                over.appendChild(light);
                over.appendChild(imgBox);
                over.appendChild(title);

                setTimeout(() => {
                    title.style.transition = 'opacity 0.3s';
                    title.style.opacity = 0;
                    light.style.transition = 'opacity 0.3s';
                    light.style.opacity = 0;
                    over.style.opacity = '0'; 

                    let iRect = imgBox.getBoundingClientRect();
                    imgBox.style.position = 'fixed';
                    imgBox.style.left = iRect.left + 'px';
                    imgBox.style.top = iRect.top + 'px';
                    imgBox.style.margin = '0';
                    imgBox.style.animation = 'none';
                    
                    let zRect = zone.getBoundingClientRect();
                    let targetX = zRect.left + x;
                    let targetY = zRect.top + y;

                    imgBox.offsetHeight; 

                    imgBox.style.transition = 'all 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
                    imgBox.style.left = (targetX - 45) + 'px'; 
                    imgBox.style.top = (targetY - 45) + 'px';
                    imgBox.style.transform = 'scale(0.4)';

                    setTimeout(() => {
                        over.remove();
                        this.spawnAnimal(data, zone, x, y);
                        this.updateUI();
                        
                        let poofSize = 150 + (count * 20); 
                        let poof = document.createElement('div'); 
                        poof.className = 'merge-poof'; 
                        poof.style.width = poofSize + 'px'; 
                        poof.style.height = poofSize + 'px'; 
                        poof.style.left = x + 'px'; 
                        poof.style.top = y + 'px'; 
                        zone.appendChild(poof); 
                        setTimeout(() => poof.remove(), 600);

                    }, 600);
                    
                }, 2000);
            },

            updateUI() {
                if(MatchState.isPrankMode) return;

                let infoPanel = document.getElementById('habitat-info-panel');
                let mainScroll = this.scroller.scrollLeft;
                let pageW = this.scroller.offsetWidth;

                if (mainScroll < pageW * 1.5) { infoPanel.style.opacity = '0'; infoPanel.style.pointerEvents = 'none'; return; }

                let zs = document.querySelectorAll('.habitat-zone'); 
                if(zs.length===0) { infoPanel.style.opacity = '0'; infoPanel.style.pointerEvents = 'none'; return; }

                infoPanel.style.display = 'flex'; infoPanel.style.opacity = '1'; infoPanel.style.pointerEvents = 'auto';

                let idx = Math.min(Math.max(0, Math.round(this.area.scrollLeft / (zs[0].offsetWidth||this.area.offsetWidth))), zs.length-1);
                let z = zs[idx], tid = z.dataset.type, hLv = State.habitatLevels[tid]||1;
                
                let anis = State.animals.filter(a=>(a.type||'cat') === tid);
                let maxL = Math.max(1, ...anis.map(a=>a.level||1));
                
                let repAni = anis.reduce((max, obj) => {
                    let s1 = (obj.rarity === 'rare' ? 1000 : 0) + (obj.level || 1);
                    let s2 = (max.rarity === 'rare' ? 1000 : 0) + (max.level || 1);
                    return s1 > s2 ? obj : max;
                }, anis[0]);

                let pre = Config.EVO[repAni.level||1] ? Config.EVO[repAni.level||1].namePrefix : "";
                if(repAni && repAni.rarity === 'rare') pre = "特殊·";

                document.getElementById('ui-ani-name').innerText = pre + z.dataset.name; 
                document.getElementById('ui-ani-count').innerText = anis.length;
                document.getElementById('ui-ani-img').src = repAni.url; 
                document.getElementById('ui-ani-img').className = 'info-avatar-img ' + (Config.EVO[repAni.level||1]?Config.EVO[repAni.level||1].class:'');
                document.getElementById('ui-ani-lv').innerText = hLv;
                document.querySelector('.upgrade-cost').innerHTML = `<img src="./img/animal_coin.png" style="width:12px;height:12px;margin-right:2px;"> ${hLv*500}`;
                document.getElementById('info-level-fill').style.width = `${(hLv%10)*10}%`;

                let prof = 0; anis.forEach(a => prof += (3.0/anis.length)+((hLv-1)*1.5/anis.length)+(0.5*(a.level||1)**2));
                document.querySelector('.info-profit').innerHTML = `${prof.toFixed(1)} <img src="./img/animal_coin.png" style="width:12px;height:12px;">/分钟`;

                document.querySelector('.zone-prev').style.display = idx===0?'none':'block'; document.querySelector('.zone-next').style.display = idx===zs.length-1?'none':'block';
                this.area.dataset.tid = tid; this.area.dataset.cost = hLv*500;
            },
            scrollZone(dir) { this.area.scrollBy({left: dir * (this.area.firstElementChild?.offsetWidth||this.area.offsetWidth), behavior:'smooth'}); setTimeout(()=>this.updateUI(), 350); },

            initVisitors() {
                visitors.forEach(v=>{clearTimeout(v.timer); if(v.el.parentNode) v.el.parentNode.removeChild(v.el);}); visitors=[];
                if(State.trashCount>0 && !MatchState.isPrankMode) return;

                let l = document.getElementById('global-visitor-layer');
                let w = l.clientWidth || window.innerWidth * 3, h = l.clientHeight || window.innerHeight;

                for(let i=0; i<15; i++) {
                    let v = { el: document.createElement('img'), x:0, y:0, timer:null }; 
                    v.el.className='visitor'; v.el.src=Config.VISITORS[Math.floor(Math.random()*Config.VISITORS.length)];

                    v.x = Math.random() * (w - 40);
                    v.y = (v.x < w/3*2) ? (h*0.35 + Math.random()*(h-130 - h*0.35)) : (h-416+10 + Math.random()*40);
                    v.el.style.left = v.x + 'px'; v.el.style.top = v.y + 'px'; v.el.style.zIndex = Math.floor(v.y);

                    l.appendChild(v.el); visitors.push(v); this.visAI(v, w, h);
                }
            },
          visAI(v, w, h) {
                if(Math.random()<0.3) { 
                    v.el.className='visitor'; 
                    v.timer=setTimeout(()=>this.visAI(v,w,h), 1000+Math.random()*2000); 
                } else {
                    v.el.className='visitor walking'; 
                    let tX = Math.random()*(w-40), tY;
                    if(tX < w/3*2) tY = h*0.4 + Math.random()*(h*0.4); else tY = (h * 0.65 + 10) + Math.random()*(h * 0.35 - 50);
                    let dur = Math.max(1000, Math.hypot(tX-v.x, tY-v.y)/60*1000);

                    requestAnimationFrame(() => {
                        v.el.classList.toggle('face-left', tX < v.x); 
                        v.el.style.transition = `left ${dur}ms linear, top ${dur}ms linear`;
                        v.el.style.left=tX+'px'; v.el.style.top=tY+'px'; v.el.style.zIndex=Math.floor(tY); 
                        v.x=tX; v.y=tY;
                        v.timer = setTimeout(()=>this.visAI(v,w,h), dur);
                    });
                }
            }
        };

        const scroller = document.getElementById('zoo-scroller');
        const habArea = document.getElementById('habitat-animal-area');
        let scrollerIsDown = false, scrollerStartX, scrollerScrollLeft;

        scroller.addEventListener('mousedown', (e) => { 
            scrollerIsDown = true; scroller.classList.add('active'); 
            scrollerStartX = e.pageX; scrollerScrollLeft = scroller.scrollLeft; 
        });
        window.addEventListener('mouseup', () => { 
            if(scrollerIsDown) { scrollerIsDown = false; scroller.classList.remove('active'); scroller.style.scrollSnapType = 'x mandatory'; scroller.style.scrollBehavior = 'smooth'; setTimeout(()=>ZooSystem.updateUI(), 350); } 
            if(habIsDown) { habIsDown = false; habArea.style.scrollSnapType = 'x mandatory'; habArea.style.scrollBehavior = 'smooth'; scroller.style.scrollSnapType = 'x mandatory'; scroller.style.scrollBehavior = 'smooth'; setTimeout(()=>ZooSystem.updateUI(), 350); }
        });
        window.addEventListener('mousemove', (e) => { 
            if (scrollerIsDown) { scroller.style.scrollSnapType = 'none'; scroller.style.scrollBehavior = 'auto'; scroller.scrollLeft = scrollerScrollLeft - (e.pageX - scrollerStartX) * 1.5; }
            if (habIsDown) { 
                const walk = (e.pageX - habStartX) * 1.5; let targetScroll = habScrollLeft - walk; 
                if (targetScroll < 0) { habArea.scrollLeft = 0; scroller.scrollLeft = initialScrollerScroll + targetScroll; } 
                else { habArea.scrollLeft = targetScroll; scroller.scrollLeft = initialScrollerScroll; }
            }
        });

        let habIsDown = false, habStartX, habScrollLeft, initialScrollerScroll;
        habArea.addEventListener('mousedown', (e) => { 
            habIsDown = true; habArea.style.scrollSnapType = 'none'; habArea.style.scrollBehavior = 'auto'; scroller.style.scrollSnapType = 'none'; scroller.style.scrollBehavior = 'auto'; 
            habStartX = e.pageX; habScrollLeft = habArea.scrollLeft; initialScrollerScroll = scroller.scrollLeft; e.stopPropagation(); 
        });

        scroller.addEventListener('scroll', () => ZooSystem.updateUI());
        habArea.addEventListener('scroll', () => ZooSystem.updateUI());

        // ==================== 7. 事件与玩法(捣乱、派对等) ====================
        const EventSystem = {
            triggerPanic(threatX) {
                visitors.forEach(v => {
                    clearTimeout(v.timer); v.el.className='visitor'; v.el.style.transition='none';
                    setTimeout(() => {
                        let b = document.createElement('div'); b.className='visitor-bubble'; b.innerText='好臭! 🤢'; 
                        b.style.cssText=`left:${v.x}px;top:${v.y-40}px`; document.getElementById('global-visitor-layer').appendChild(b);
                        setTimeout(() => { 
                            b.remove(); v.el.className='visitor walking'; v.el.style.animationDuration='0.08s'; 
                            v.el.style.transition='left 1s ease-in'; 
                            v.el.style.left = (v.x < ZooSystem.scroller.scrollLeft+window.innerWidth/2 ? -100 : window.innerWidth*3)+'px'; 
                            setTimeout(()=>v.el.remove(),1500); 
                        }, 1000);
                    }, Math.random()*1000);
                });
                currentZooAnimals.forEach(a => { 
                    a.wrapper.dataset.panic='true'; a.img.className='zoo-animal walking'; a.img.style.animationDuration='0.15s'; a.wrapper.style.transition='all 0.6s ease'; 
                    a.wrapper.style.left = (a.x+a.container.offsetLeft < threatX ? 30 : a.container.clientWidth-70)+'px'; 
                });
            },

            simulateAttack() {
                if(State.trashCount>0) return UI.toast("动物园里已经有垃圾了，快去清理吧！");
                State.trashCount = 10; Storage.save();
                let banner = document.getElementById('attack-alert-banner'); banner.innerText = `⚠️ 你的动物园被【${Config.NPCS[Math.floor(Math.random()*Config.NPCS.length)]}】扔满了垃圾！`;
                banner.classList.add('show'); setTimeout(()=>banner.classList.remove('show'), 4000);

                if(ZooSystem.screen.style.display==='flex' && !MatchState.isPrankMode) {
                    let gc = document.getElementById('game-container');
                    gc.style.animation='none'; gc.offsetHeight; gc.style.animation='screenShake 0.3s ease-out';

                    let cS = ZooSystem.area.scrollLeft, vW = ZooSystem.area.clientWidth;
                    for(let i=0; i<10; i++) setTimeout(()=>{ AudioSys.click(); this.dropTrash(cS+(Math.random()*vW*0.8)+vW*0.1, Math.random()*(ZooSystem.area.clientHeight-100)+50); }, i*100);

                    this.triggerPanic(cS + vW/2);
                }
            },
            dropTrash(x, y, isFake=false) {
                let t = document.createElement('div'); t.className = isFake?'trash-obj':'trash-obj player-trash'; t.innerText=Config.TRASH[Math.floor(Math.random()*Config.TRASH.length)];
                t.style.left=x+'px'; t.style.top=y+'px'; t.style.transform=`rotate(${Math.random()*360}deg)`;
                if(!isFake) t.onclick = (e) => { e.stopPropagation(); t.style.transform='scale(0)'; setTimeout(()=>{t.remove(); State.trashCount--; Storage.save(); if(State.trashCount<=0) { UI.toast("✨ 打扫干净啦！游客们回来了！"); currentZooAnimals.forEach(a=>a.wrapper.dataset.panic='false'); ZooSystem.initVisitors(); }}, 200); };
                ZooSystem.area.appendChild(t);
            },
            renderTrash() { document.querySelectorAll('.player-trash').forEach(e=>e.remove()); if(State.trashCount<=0) return; for(let i=0; i<State.trashCount; i++) this.dropTrash(Math.random()*(ZooSystem.area.scrollWidth-100)+50, Math.random()*(ZooSystem.area.clientHeight-100)+50); },
            enterPrank() {
                document.getElementById('cut-screen').classList.add('active'); AudioSys.bgmPause(); MatchState.isPrankMode=true; MatchState.prankTrashCount=10;
                setTimeout(() => {
                    ZooSystem.open(true); document.getElementById('game-container').classList.add('prank-active');
                    ZooSystem.area.innerHTML=''; currentZooAnimals=[];
                    Config.ANIMALS.sort(()=>0.5-Math.random()).slice(0,3).forEach(a => {
                        let z = document.createElement('div'); z.className='habitat-zone'; z.innerHTML='<div class="habitat-fence"></div>'; ZooSystem.area.appendChild(z);
                        for(let i=0; i<3; i++) ZooSystem.spawnAnimal(a, z);
                    });
                    document.getElementById('cut-screen').classList.remove('active');
                }, 500);
            },
            throwPrankTrash(e) {
                if(!MatchState.isPrankMode || MatchState.prankTrashCount<=0) return; MatchState.prankTrashCount=0; 
                let gc = document.getElementById('game-container');
                gc.style.animation='none'; gc.offsetHeight; gc.style.animation='screenShake 0.3s ease-out';
                let r = ZooSystem.area.getBoundingClientRect(), cX = e.clientX-r.left+ZooSystem.area.scrollLeft, cY = e.clientY-r.top;

                for(let i=0; i<10; i++) setTimeout(()=>{ AudioSys.click(); this.dropTrash(cX+(Math.random()-0.5)*200, cY+(Math.random()-0.5)*100, true); }, i*100);

                this.triggerPanic(cX);
                setTimeout(()=> { document.getElementById('prank-modal').style.display='flex'; }, 1500);
            },
            exitPrank() {
                document.getElementById('prank-modal').style.display='none'; document.getElementById('cut-screen').innerText="🏃‍♂️ 正在逃回自己家..."; document.getElementById('cut-screen').classList.add('active');
                setTimeout(() => {
                    MatchState.isPrankMode=false; MatchState.pendingPrank=false; document.getElementById('game-container').classList.remove('prank-active');
                    if(document.getElementById('game-container').classList.contains('party-active')) AudioSys.bgmPlay();
                    setTimeout(()=>document.getElementById('cut-screen').innerText="🚀 正在前往邻居家...", 600);
                    if(MatchState.pendingLevelComplete) { MatchState.pendingLevelComplete=false; ZooSystem.close(); MatchGame.levelComplete(); } else { ZooSystem.close(); }
                    document.getElementById('cut-screen').classList.remove('active');
                }, 600);
            },
           startParty() {
                let gc = document.getElementById('game-container'); gc.classList.add('party-active'); AudioSys.bgmPlay();
                if(partyCoinTimer) clearInterval(partyCoinTimer);
                partyCoinTimer = setInterval(()=>{
                    if(MatchState.isPrankMode) return; let ts = Array.from(document.querySelectorAll('.visitor')); if(ts.length===0) return;
                    let lucky = ts[Math.floor(Math.random()*ts.length)], r = lucky.getBoundingClientRect();
                    this.flyCoin(1, r.left+r.width/2, r.top+r.height/2, true);
                }, 600);
                setTimeout(()=>{ gc.classList.remove('party-active'); AudioSys.bgmPause(); clearInterval(partyCoinTimer); }, 60000);
            },
            flyCoin(amt, x, y, toZoo=false) {
                let c = document.createElement('div'); c.className='fly-coin'; c.style.left=x+'px'; c.style.top=y+'px'; c.style.transition='all 0.8s ease-in-out'; document.body.appendChild(c);
                let pR = document.getElementById(toZoo?'zoo-coin-count':'coin-pill').getBoundingClientRect();
                setTimeout(()=>{ c.style.left=(pR.left+pR.width/2-15)+'px'; c.style.top=(pR.top+pR.height/2-15)+'px'; c.style.opacity=0; c.style.transform='scale(0.5)'; }, 50);
                setTimeout(()=>{ c.remove(); State.coins+=amt; Storage.save(); }, 850);
            }
        };
        ZooSystem.area.addEventListener('click', (e) => { if(MatchState.isPrankMode) EventSystem.throwPrankTrash(e); });

        setInterval(() => {
            if (State.animals.length===0 || State.trashCount>0) return;
            let prof = 0;
            [...new Set(State.animals.map(a=>a.type||'cat'))].forEach(tid => {
                let anis = State.animals.filter(a=>(a.type||'cat')===tid), hLv = State.habitatLevels[tid]||1;
                anis.forEach(a => prof += (3.0/anis.length)+((hLv-1)*1.5/anis.length)+(0.5*(a.level||1)**2));
            });
            State.coins += prof/12;
            if (Math.floor(State.coins) !== parseInt(document.getElementById('zoo-coin-count').innerText)) Storage.save();
        }, 5000);

        // ==================== 8. 启动 ====================
        window.addEventListener('load', () => { SpineManager.init(); Storage.load(); ZooSystem.open(true); });
    </script>
</body>
</html>
